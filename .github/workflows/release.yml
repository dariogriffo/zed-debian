name: Build zed for Debian

on:
  workflow_dispatch:
    inputs:
      zed_version:
        description: The version of zed to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true
      architecture:
        description: Architecture to build (amd64, arm64, armel, armhf, ppc64el, s390x, riscv64, or 'all' for all architectures)
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'amd64'
          - 'arm64'
          - 'armel'
          - 'armhf'
          - 'ppc64el'
          - 's390x'
          - 'riscv64'

permissions:
  contents: write

jobs:
  build-zed:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zed-debian
        uses: actions/checkout@v4

      - name: Build zed
        run: ./build.sh ${{ inputs.zed_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: zed_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zed-debian
        uses: actions/checkout@v4

      - name: Install dpkg-dev and tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.zed_version }} ${{ inputs.build_version }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            zed_*.dsc
            zed_*.orig.tar.gz
            zed_*.debian.tar.xz

  release-zed:
    name: Release zed for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-zed, build-src]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            zed_*.deb
            zed_*.dsc
            zed_*.orig.tar.gz
            zed_*.debian.tar.xz
          name: ${{ inputs.zed_version }}-${{ inputs.build_version }}
          tag_name: ${{ inputs.zed_version }}-${{ inputs.build_version }}
          fail_on_unmatched_files: true
